<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenmart</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/css/general.css.css" />
    <link rel="stylesheet" href="public/css/home.css" />
  </head>
  <body>
    <div class="navbar_frame">
      <div class="container">
        <div class="navbar_top">
          <a href=""><img src="public/images/Group 50.png" alt="" /></a>
          <div class="nav_search_frame">
            <div class="search_box">
              <div class="category_list">
                <select name="" id="">
                  <option value="" selected>All Categories</option>
                  <option value="">Compyuter</option>
                </select>
              </div>
              <input type="search" placeholder="Search Products..." />
            </div>
            <div class="search_icon_box">
              <img src="public/images/search.svg" alt="" />
            </div>
          </div>
          <div class="nav_top_menu">
            <a href="./order/card.html"
              ><div class="top_menu_box">
                <div class="box_icon_box">
                  <img src="public/images/heart.svg" alt="" />
                </div>
                <div class="box_info_box">
                  <span>Wishlist</span>
                  <strong>My Items</strong>
                </div>
              </div></a
            >
            <a href="./other/login.html"
              ><div class="top_menu_box">
                <div class="box_icon_box">
                  <img src="public/images/account.svg alt=" />
                </div>
                <div class="box_info_box">
                  <span>Sign In</span>
                  <strong>Account</strong>
                </div>
              </div></a
            >
            <a href="./order/card.html"
              ><div class="top_menu_box">
                <div class="box_icon_box">
                  <div class="basket_count">2</div>
                  <img src="public/images/backet.svg" alt="" />
                </div>
                <div class="box_info_box">
                  <span>$200.99</span>
                  <strong>Total</strong>
                </div>
              </div></a
            >
          </div>
        </div>
        <div class="navbar_bott">
          <div class="navbar_bott_menu_box">
            <div class="browse_box">
              <img src="public/images/navbar/browse.svg" alt="" />
              <span>Browse Categories</span>
            </div>
            <div class="sorting_menu">
              <span>Deal of the day</span>
              <span>Hot Deals</span>
              <span>Best Sellers</span>
              <span>New Arrivals</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
